# ── Fluency Bridge — Production Stack ─────────────────────────
services:
  # ── Node.js Backend (Express + SQLite) ───────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluency_bridge_backend
    restart: unless-stopped
    environment:
      - DB_PATH=/data/waitlist.db
      - PORT=8080
    volumes:
      - fluency_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - fluency

  # ── nginx Frontend (static files + reverse proxy) ────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: fluency_bridge_frontend
    restart: unless-stopped
    ports:
      - "8088:80"
    depends_on:
      - backend
    networks:
      - fluency
      - coolify

volumes:
  fluency_data:
    driver: local

networks:
  fluency:
    driver: bridge
  # Connect to Coolify's Traefik for custom domains + HTTPS
  coolify:
    external: true
