# ── Fluency Bridge — Production Stack ─────────────────────────
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluency_bridge_backend
    restart: unless-stopped
    environment:
      - DB_PATH=/data/waitlist.db
      - PORT=8080
    volumes:
      - fluency_data:/data
    networks:
      - fluency

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: fluency_bridge_frontend
    restart: unless-stopped
    ports:
      - "8088:80"
    networks:
      - fluency
      - coolify

volumes:
  fluency_data:
    driver: local

networks:
  fluency:
    driver: bridge
  coolify:
    external: true
