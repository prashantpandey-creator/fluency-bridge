name: Deploy Fluency Bridge to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 204.168.176.229
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Fluency Bridge Deploy ==="

            # Clone or update repo
            if [ -d /root/fluency-bridge ]; then
              cd /root/fluency-bridge
              git fetch origin
              git reset --hard origin/main
              git clean -fd
            else
              cd /root
              git clone https://github.com/prashantpandey-creator/fluency-bridge.git
              cd fluency-bridge
            fi

            # Ensure coolify network exists
            docker network inspect coolify >/dev/null 2>&1 || docker network create coolify

            # Build and deploy
            docker compose build --no-cache
            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d
            docker image prune -f

            echo ""
            echo "=== Deploy complete ==="
            echo "Public:  http://204.168.176.229:8080"
            echo "Admin:   http://204.168.176.229:8080/admin"
            echo "API:     http://204.168.176.229:8080/api/waitlist"
            docker compose ps
